<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Migraine Tracker</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="theme-color" content="#0D1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Migraine Tracker">
    <link rel="apple-touch-icon" href="/icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'dark-bg': '#0D1117',
              'dark-bg-secondary': '#161B22',
              'dark-border': '#30363D',
              'dark-text-primary': '#E6EDF3',
              'dark-text-secondary': '#8B949E',
              'dark-primary': '#58A6FF',
              'dark-secondary': '#484F58',
              'dark-accent': '#79C0FF',
              'dark-success': '#3FB950',
              'dark-danger': '#F85149',
              'dark-warning': '#D29922',
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "chart.js": "https://esm.sh/chart.js@4.4.3",
    "chart.js/auto": "https://esm.sh/chart.js@4.4.3/auto",
    "react-dom/": "https://esm.sh/react-dom@18.3.1/",
    "react/": "https://esm.sh/react@18.3.1/",
    "chart.js/": "https://esm.sh/chart.js@4.4.3/",
    "dexie": "https://esm.sh/dexie@3.2.7"
  }
}
</script>
</head>
  <body class="bg-dark-bg">
    <div id="root"></div>
    <script type="module" src="/index.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }, err => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
