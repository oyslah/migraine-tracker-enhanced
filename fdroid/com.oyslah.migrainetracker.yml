AutoName: Migraine Tracker
Summary: Privacy-first migraine tracking with medication overuse monitoring
Description: |
  A fully offline migraine tracker for Android. Track migraine
  attacks, acute medications, triggers, symptoms, and life changes.
  Built-in Medication Overuse Headache (MOH) risk gauges with
  per-category thresholds and customizable push notifications for
  preventative medication reminders and daily check-ins.

  All data stays on your device — no accounts, no cloud, no tracking.
  Dark mode optimized for light-sensitive users. Analytics show
  attack frequency, severity trends, trigger correlations, and
  symptom patterns over time.

RepoType: git
Repo: https://github.com/oyslah/migraine-tracker-enhanced

